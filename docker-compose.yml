services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: findopedia
      POSTGRES_USER: findopedia
      POSTGRES_PASSWORD: findopedia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findopedia"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      APP_PORT: "8080"
      POSTGRES_DSN: postgres://findopedia:findopedia@postgres:5432/findopedia?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRY_HOURS: "168"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
